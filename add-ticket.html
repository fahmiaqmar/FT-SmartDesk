<!DOCTYPE html>

<html>

<head>

<title>
New Ticket - FT SmartDesk
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<div class="container-fluid">

<div class="row">


<div class="col-md-2 sidebar">


<h4 class="p-3">
FT SmartDesk
</h4>


<a href="dashboard.html">
Dashboard
</a>


<a href="add-ticket.html">
New Ticket
</a>


<a href="tickets.html">
Ticket List
</a>


<a href="#" onclick="logout()">
Logout
</a>


</div>



<div class="col-md-10 p-4">


<h2>
Create New Ticket
</h2>



<div class="card-box">


<form id="ticketForm">


<label>
Customer Name
</label>

<input 
id="customer"
class="form-control mb-3"
required>



<label>
Company
</label>

<input 
id="company"
class="form-control mb-3">



<label>
Device Model
</label>

<input 
id="device"
class="form-control mb-3">



<label>
Category
</label>


<select 
id="category"
class="form-control mb-3">


<option>
Hardware
</option>

<option>
Software
</option>

<option>
Networking
</option>

<option>
Attendance Device
</option>

<option>
Phone Repair
</option>


</select>



<label>
Priority
</label>


<select 
id="priority"
class="form-control mb-3">


<option>
Low
</option>

<option>
Medium
</option>

<option>
High
</option>

<option>
Critical
</option>


</select>




<label>
Problem Description
</label>


<textarea
id="problem"
class="form-control mb-3">
</textarea>



<label>
Technician
</label>


<input 
id="technician"
class="form-control mb-3">



<button 
class="btn btn-primary">

Save Ticket

</button>


</form>


</div>


</div>


</div>

</div>


if(localStorage.getItem("login")!="true"){

window.location="index.html";

}


<script src="assets/js/ticket.js"></script>


</body>

</html>
