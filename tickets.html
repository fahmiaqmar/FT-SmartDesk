<body>


<div class="container-fluid">

<h2>
Ticket List

<div class="row mb-3">

id="search"
class="form-control"

</div>


<div class="col-md-4">

<select 
id="categoryFilter"

</option>

<option>

</option>

<option>

</option>

<option>

</option>

<option>

</option>


</select>

</div>



<div class="col-md-4">


<select 
id="statusFilter"
class="form-control">


<option value="">

</option>


<option>

</option>

<option>

</option>

<option>

</option>

<option>
Completed
</option>


</select>

<table class="table table-bordered">


<thead>

<tr>

<tr>

<th>ID</th>

<th>Date</th>

<th>Customer</th>

<th>Device</th>

<th>Category</th>

<th>Priority</th>

</tr>

</tbody>
